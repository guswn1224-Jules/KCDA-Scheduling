<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Chair Pre-Meeting Scheduler | 2026 KoNECT-MOHW-MFDS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --navy:#2E1C5F;
    --navy-soft:#4B3B82;
    --blue:#4361AC;
    --coral:#EB6974;
    --lightblue:#9BABD7;
    --bg:#F6F6FB;
    --card:#FFFFFF;
    --line:#E4E3F1;
    --ink:#2A2740;
    --muted:#7A7793;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px 64px;}

  /* Header */
  .hero{
    background:linear-gradient(155deg,var(--navy) 0%,#3a2a72 60%,var(--navy-soft) 100%);
    padding:36px 20px 46px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute;
    right:-60px;top:-60px;
    width:260px;height:260px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(235,105,116,0.28),transparent 70%);
  }
  .hero-inner{max-width:1080px;margin:0 auto;position:relative;z-index:1;}
  .hero-logo{max-width:560px;width:100%;height:auto;}
  .hero-sub{
    margin-top:18px;
    color:#EFEEFA;
    font-size:17px;
    letter-spacing:0.02em;
  }
  .hero-title{
    margin:6px 0 0;
    font-size:31px;
    font-weight:800;
    color:#fff;
    letter-spacing:-0.01em;
  }
  .hero-title-sub{
    margin:2px 0 0;
    font-size:16.5px;
    font-weight:600;
    color:#C9C4E8;
  }

  /* Info strip */
  .info-strip{
    margin-top:14px;
    position:relative;
    z-index:2;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .info-pill{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 18px;
    box-shadow:0 8px 24px -14px rgba(46,28,95,0.35);
    display:flex;
    align-items:center;
    gap:10px;
    font-size:15.5px;
    color:var(--ink);
    flex:1;
    min-width:230px;
  }
  .info-pill b{color:var(--navy);font-weight:700;}
  .info-pill .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--coral);flex:none;
  }

  .back-link{display:inline-block;margin-top:18px;color:var(--blue);font-size:15px;font-weight:700;text-decoration:none;}
  .back-link:hover{text-decoration:underline;}

  /* Tabs */
  .tabs{
    display:flex;
    gap:6px;
    margin-top:20px;
    border-bottom:1px solid var(--line);
  }
  .tab-btn{
    appearance:none;
    border:none;
    background:none;
    padding:13px 20px;
    font-family:inherit;
    font-size:17px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    border-bottom:2.5px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .tab-btn:hover{color:var(--navy-soft);}
  .tab-btn.active{color:var(--navy);border-color:var(--coral);}

  .panel{display:none;padding-top:22px;}
  .panel.active{display:block;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
  }
  .card h3{margin:0 0 4px;font-size:19px;color:var(--navy);font-weight:800;}
  .card p.desc{margin:0 0 14px;color:var(--muted);font-size:15.5px;line-height:1.7;}

  .btn{
    appearance:none;border:none;border-radius:10px;
    padding:13px 22px;font-family:inherit;font-weight:700;font-size:16.5px;
    cursor:pointer;transition:transform .1s ease, box-shadow .15s ease, opacity .15s ease;
    text-decoration:none;display:inline-flex;align-items:center;justify-content:center;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-soft);}
  .btn-primary:active{transform:scale(0.98);}
  .btn-secondary{background:#fff;color:var(--navy);border:1.5px solid var(--line);}
  .btn-secondary:hover{border-color:var(--lightblue);}
  .btn-coral{background:var(--coral);color:#fff;}
  .btn-coral:hover{opacity:0.9;}
  .btn-ghost{background:transparent;color:var(--muted);}
  .btn-ghost:hover{color:var(--navy);}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn-sm{padding:9px 16px;font-size:14.5px;}

  .empty-state{
    text-align:center;padding:48px 20px;color:var(--muted);font-size:16.5px;line-height:1.9;
  }
  .empty-state .big{font-size:40px;margin-bottom:8px;}

  /* Timezone banner */
  .tz-banner{
    background:#FFF6E9;border:1px solid #F4DFB8;color:#8A5A00;
    border-radius:10px;padding:11px 16px;font-size:14.5px;margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .tz-banner label{display:flex;align-items:center;gap:6px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .tz-banner input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#8A5A00;}
  .tz-banner select{
    font-family:inherit;font-size:12.5px;font-weight:700;color:#8A5A00;
    border:1.5px solid #F4DFB8;border-radius:8px;padding:5px 8px;background:#fff;cursor:pointer;
  }

  /* Grid */
  .grid-scroll{overflow-x:auto;overflow-y:visible;border:1px solid var(--line);border-radius:12px;}
  .grid{display:grid;user-select:none;}
  .g-corner, .g-datehead, .g-hour, .g-cell{
    border-right:1px solid var(--line);
    border-bottom:1px solid var(--line);
    font-size:14.5px;
  }
  .g-corner{
    position:sticky;top:0;left:0;z-index:3;
    background:var(--card);
    min-height:52px;
  }
  .g-datehead{
    position:sticky;top:0;z-index:2;
    background:var(--card);
    text-align:center;
    padding:8px 4px;
    font-weight:700;
    color:var(--navy);
    line-height:1.35;
  }
  .g-datehead .wd{font-size:12px;color:var(--muted);font-weight:600;}
  .g-datehead .wd-local{font-size:9.5px;color:var(--coral);font-weight:600;margin-top:1px;white-space:nowrap;}
  .g-hour{
    position:sticky;left:0;z-index:1;
    background:var(--card);
    padding:6px 10px;
    color:var(--ink);
    font-weight:700;
    white-space:nowrap;
    display:flex;flex-direction:column;justify-content:center;
  }
  .g-hour .local{font-size:10.5px;color:var(--coral);font-weight:600;margin-top:1px;white-space:nowrap;}
  .g-cell{
    min-height:32px;
    background:#fff;
    cursor:pointer;
    transition:background .05s ease;
  }
  .g-cell:hover{background:#EFEFFA;}
  .g-cell.selected{background:var(--navy);}
  .g-cell.heat{cursor:default;}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(30,20,60,0.45);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:#fff;border-radius:16px;padding:26px;width:100%;max-width:380px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,0.4);
  }
  .modal-box h4{margin:0 0 6px;color:var(--navy);font-size:22px;}
  .modal-box p{margin:0 0 16px;color:var(--muted);font-size:16px;line-height:1.7;}
  .modal-box input[type=text]{
    width:100%;padding:13px 15px;border-radius:9px;border:1.5px solid var(--line);
    font-family:inherit;font-size:16.5px;margin-bottom:14px;
  }
  .modal-box input[type=text]:focus{outline:none;border-color:var(--lightblue);}

  /* Legend */
  .legend{display:flex;align-items:center;gap:8px;font-size:14.5px;color:var(--muted);margin-top:10px;flex-wrap:wrap;}
  .legend .sq{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid var(--line);}

  /* Calendar (admin) */
  .cal-group{margin-bottom:18px;}
  .cal-group h4{margin:0 0 8px;font-size:13.5px;color:var(--navy-soft);font-weight:700;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-wd{text-align:center;font-size:13px;color:var(--muted);font-weight:700;padding-bottom:2px;}
  .cal-day{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    border-radius:8px;border:1.5px solid var(--line);font-size:15px;font-weight:600;
    cursor:pointer;color:var(--ink);background:#fff;
  }
  .cal-day.empty{visibility:hidden;cursor:default;}
  .cal-day.active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .cal-day:hover:not(.empty):not(.active){border-color:var(--lightblue);}

  .name-chip{
    display:inline-flex;align-items:center;gap:6px;background:#F0EFFB;color:var(--navy-soft);
    padding:6px 13px;border-radius:999px;font-size:14.5px;font-weight:600;margin:3px 4px 0 0;
  }

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);
    background:var(--navy);color:#fff;padding:13px 22px;border-radius:10px;font-size:15.5px;
    box-shadow:0 12px 30px -10px rgba(0,0,0,0.4);opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;z-index:80;max-width:88vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .top-slots{display:flex;flex-direction:column;gap:8px;}
  .top-slot-row{
    display:flex;align-items:center;gap:12px;background:#F8F8FD;border:1px solid var(--line);
    border-radius:10px;padding:11px 16px;font-size:15px;
  }
  .top-slot-row .rank{
    width:26px;height:26px;border-radius:50%;background:var(--coral);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:none;
  }
  .top-slot-row .count{margin-left:auto;color:var(--navy);font-weight:800;white-space:nowrap;}

  .foot{
    text-align:center;color:var(--muted);font-size:14px;margin-top:36px;line-height:2;
  }
  .foot a{color:var(--blue);text-decoration:none;font-weight:600;}

  .danger-zone{border:1.5px dashed #EBBFC1;background:#FFF7F7;}
  .danger-zone h3{color:#C23B4A;}

  .heatmap-info-box{
    background:#F0EFFB;border:1.5px solid var(--lightblue);border-radius:10px;
    padding:12px 16px;margin-bottom:12px;font-size:14.5px;color:var(--navy-soft);
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;line-height:1.6;
  }
  .heatmap-info-box .close-x{
    cursor:pointer;color:var(--muted);font-weight:800;flex:none;font-size:16px;line-height:1;
    background:none;border:none;padding:0 2px;
  }
  .heatmap-info-box b{color:var(--navy);}

  /* Hub / session list */
  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .form-row input[type=text]{
    flex:1;min-width:200px;padding:13px 15px;border-radius:9px;border:1.5px solid var(--line);
    font-family:inherit;font-size:16.5px;
  }
  .form-row input[type=text]:focus{outline:none;border-color:var(--lightblue);}

  .link-box{
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#F8F8FD;border:1px solid var(--line);
    border-radius:10px;padding:10px;margin-top:10px;
  }
  .link-box input.link-input{
    flex:1;min-width:180px;border:none;background:transparent;font-family:monospace;font-size:14px;
    color:var(--navy-soft);padding:6px 8px;
  }
  .link-box input.link-input:focus{outline:none;}

  .session-row{
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:#fff;
  }
  .session-title{font-weight:800;color:var(--navy);font-size:17px;}
  .session-sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .session-actions{margin-top:10px;}

  @media (max-width:640px){
    .hero-title{font-size:23px;}
    .hero-logo{max-width:360px;}
    .tab-btn{padding:10px 14px;font-size:15px;}
  }

.schedule-grid{
  width:100%;
  border-collapse:collapse;
}

.schedule-grid th,
.schedule-grid td{
  border:1px solid #ddd;
  text-align:center;
  padding:12px;
}

.slot-cell{
  cursor:pointer;
  background:#fff;
  min-width:70px;
  height:50px;
}

.slot-cell:hover{
  background:#eef2ff;
}

.slot-cell.selected{
  background:#2E1C5F;
}
  
</style>
</head>
<body>
<div style="
   padding:20px;
   background:#fff;
   border-bottom:1px solid #ddd;
">
   <h1>KCDA Group Scheduler</h1>
</div>
<div class="wrap">

  <!-- HUB VIEW -->
  <div id="hubView">
    <div id="hubLocked" class="empty-state" style="display:none;"></div>
    <div id="hubAdminContent">
      <div class="card">
        <h3 id="hubHeading"></h3>
        <p class="desc" id="hubDesc"></p>
        <div id="createForm">
          <div class="form-row">
            <input type="text" id="titleKoInput" placeholder="세션 이름 (한국어)">
            <input type="text" id="titleEnInput" placeholder="Session name (English)">
          </div>
          <button class="btn btn-primary" id="createSessionBtn"></button>
        </div>
        <div id="createResult"></div>
      </div>
      <div class="card">
        <h3 id="hubListHeading"></h3>
        <div class="btn-row" style="margin-bottom:14px;">
          <button class="btn btn-secondary btn-sm" id="exportAllBtn"></button>
        </div>
        <div id="sessionList"></div>
      </div>
    </div>
  </div>

  <!-- SESSION VIEW -->
  <div id="sessionView" style="display:none;">
    <a class="back-link" id="backLink" href="#"></a>

    <div class="info-strip">
      <div class="info-pill"><span class="dot"></span><span id="infoOnline"></span></div>
      <div class="info-pill"><span class="dot"></span><span id="infoDrag"></span></div>
      <div class="info-pill"><span class="dot"></span><span id="infoContactLabel"></span>&nbsp;<b><a href="mailto:kic@konect.or.kr" style="color:var(--navy-soft);text-decoration:none;">kic@konect.or.kr</a></b></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="schedule" id="tabScheduleBtn"></button>
      <button class="tab-btn" data-tab="heatmap" id="tabHeatmapBtn"></button>
      <button class="tab-btn" data-tab="admin" id="tabAdminBtn"></button>
    </div>

    <div id="sessionNotFound" class="empty-state" style="display:none;"></div>

    <div id="sessionTabs">
      <!-- SCHEDULE TAB -->
      <div class="panel active" id="panel-schedule">
        <div class="card">
          <h3 id="schedHeading"></h3>
          <p class="desc" id="schedDesc"></p>
          <div id="tzBannerSchedule"></div>
          <div id="scheduleGridHolder"></div>
          <div class="legend">
            <span class="sq" style="background:#fff;"></span> <span id="legendUnselected"></span>
            <span class="sq" style="background:var(--navy);"></span> <span id="legendSelected"></span>
            <span style="margin-left:auto;color:var(--ink);font-weight:600;" id="selCount"></span>
          </div>
          <div class="btn-row" style="margin-top:16px;">
            <button class="btn btn-primary" id="submitBtn"></button>
            <button class="btn btn-ghost" id="clearSelBtn"></button>
            <button class="btn btn-ghost" id="loadMyResponseBtn"></button>
          </div>
        </div>
      </div>

      <!-- HEATMAP TAB -->
      <div class="panel" id="panel-heatmap">
        <div class="card">
          <h3 id="heatHeading"></h3>
          <p class="desc" id="heatDesc"></p>
          <div id="tzBannerHeatmap"></div>
          <div id="heatmapInfoBox" class="heatmap-info-box" style="display:none;"></div>
          <div id="heatmapSummary" style="margin-bottom:12px;font-size:13px;color:var(--muted);"></div>
          <div id="heatmapGridHolder"></div>
          <div class="legend">
            <span class="sq" style="background:#fff;"></span> <span id="legend0"></span>
            <span class="sq" style="background:#C7CFEA;"></span> <span id="legendLow"></span>
            <span class="sq" style="background:#5A6FB0;"></span> <span id="legendMed"></span>
            <span class="sq" style="background:var(--navy);"></span> <span id="legendHigh"></span>
          </div>
        </div>
        <div class="card">
          <h3 id="topHeading"></h3>
          <div class="top-slots" id="topSlots"></div>
        </div>
        <div class="card">
          <h3 id="listHeading"></h3>
          <div id="respondentList"></div>
        </div>
      </div>

      <!-- ADMIN TAB -->
      <div class="panel" id="panel-admin">
        <div class="card">
          <h3 id="shareLinkHeading"></h3>
          <p class="desc" id="shareLinkDesc"></p>
          <div style="font-size:12.5px;font-weight:700;color:var(--navy-soft);" id="participantLinkLabel"></div>
          <div class="link-box">
            <input type="text" class="link-input" id="sessionLinkInput" readonly>
            <button class="btn btn-secondary btn-sm" id="copySessionLinkBtn"></button>
          </div>
          <div style="font-size:12.5px;font-weight:700;color:var(--navy-soft);margin-top:14px;" id="adminLinkLabel"></div>
          <div class="link-box">
            <input type="text" class="link-input" id="adminLinkInput" readonly>
            <button class="btn btn-secondary btn-sm" id="copyAdminLinkBtn"></button>
          </div>
        </div>
        <div class="card">
          <h3 id="renameHeading"></h3>
          <div class="form-row">
            <input type="text" id="renameKoInput" placeholder="세션 이름 (한국어)">
            <input type="text" id="renameEnInput" placeholder="Session name (English)">
          </div>
          <button class="btn btn-secondary btn-sm" id="renameSaveBtn"></button>
        </div>
        <div class="card">
          <h3 id="adminDateHeading"></h3>
          <p class="desc" id="adminDateDesc"></p>
          <div id="calHolder"></div>
          <div class="btn-row" style="margin-top:16px;">
            <button class="btn btn-primary" id="saveDatesBtn"></button>
            <span id="activeDateCount" style="font-size:13px;color:var(--muted);align-self:center;"></span>
          </div>
        </div>
        <div class="card">
          <h3 id="exportHeading"></h3>
          <p class="desc" id="exportDesc"></p>
          <button class="btn btn-secondary btn-sm" id="exportSessionBtn"></button>
        </div>
        <div class="card danger-zone">
          <h3 id="dangerHeading"></h3>
          <p class="desc" id="dangerDesc"></p>
          <button class="btn" style="background:#C23B4A;color:#fff;" id="resetAllBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="foot" id="footNote"></div>
</div>

<div class="modal-overlay" id="nameModal">
  <div class="modal-box">
    <h4 id="modalTitle"></h4>
    <p id="modalDesc"></p>
    <input type="text" id="nameInput" maxlength="60">
    <input type="text" id="affiliationInput" maxlength="80">
    <div class="btn-row">
      <button class="btn btn-primary" id="modalConfirmBtn" style="flex:1;"></button>
      <button class="btn btn-ghost" id="modalCancelBtn"></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="loadModal">
  <div class="modal-box">
    <h4 id="loadModalTitle"></h4>
    <p id="loadModalDesc"></p>
    <input type="text" id="loadNameInput" maxlength="60">
    <input type="text" id="loadAffiliationInput" maxlength="80">
    <div class="btn-row">
      <button class="btn btn-primary" id="loadModalConfirmBtn" style="flex:1;"></button>
      <button class="btn btn-ghost" id="loadModalCancelBtn"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  var qs = new URLSearchParams(location.search);

  var isAdmin = qs.get('admin') === '1';

  function t(key, vars){
    var s = (TEXT[lang] && TEXT[lang][key] !== undefined) ? TEXT[lang][key] : (TEXT.en[key]||key);
    if(vars){ Object.keys(vars).forEach(function(k){ s = s.split('{'+k+'}').join(vars[k]); }); }
    return s;
  }

  function buildUrl(overrides){
    var p = new URLSearchParams(location.search);
    Object.keys(overrides).forEach(function(k){
      if(overrides[k]===null){ p.delete(k); } else { p.set(k, overrides[k]); }
    });
    var s = p.toString();
    return location.pathname + (s ? '?'+s : '');
  }
  function fullLink(id){
    var p = new URLSearchParams();
    p.set('session', id); p.set('lang', lang);
    return location.origin + location.pathname + '?' + p.toString();
  }
  function fullLinkAdmin(id){
    var p = new URLSearchParams();
    p.set('session', id); p.set('lang', lang); p.set('admin', '1');
    return location.origin + location.pathname + '?' + p.toString();
  }

  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function toISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function parseISO(s){ var p=s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
  function allRangeDates(){
    var arr=[]; var d=new Date(RANGE_START);
    while(d<=RANGE_END){ arr.push(toISO(d)); d.setDate(d.getDate()+1); }
    return arr;
  }
  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function showToast(msg){
    var el=document.getElementById('toast');
    el.innerHTML=msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 2800);
  }
  function copyText(str){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(str).then(function(){ showToast(t('toastLinkCopied')); }).catch(function(){ fallbackCopy(str); });
    } else { fallbackCopy(str); }
  }
  function fallbackCopy(str){
    var ta=document.createElement('textarea'); ta.value=str; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); showToast(t('toastLinkCopied')); }catch(e){}
    document.body.removeChild(ta);
  }

  function friendlyTz(tz){
    try{
      var parts = tz.split('/');
      var city = parts[parts.length-1].replace(/_/g,' ');
      var partsInfo = new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'short'}).formatToParts(new Date());
      var abbr = partsInfo.find(function(p){ return p.type==='timeZoneName'; });
      return city + (abbr ? ' ('+abbr.value+')' : '');
    }catch(e){ return tz; }
  }
  function localLabelForHour(hour, refDateISO){
    try{
      var ref = refDateISO || toISO(new Date());
      var kstDate = new Date(ref+'T'+pad(hour)+':00:00+09:00');
      var timeStr = kstDate.toLocaleTimeString(lang==='ko'?'ko-KR':'en-US',{timeZone:userTz,hour:'2-digit',minute:'2-digit',hour12:false});
      var localDay = kstDate.toLocaleDateString('en-CA',{timeZone:userTz});
      var diffLabel = '';
      if(localDay !== ref){
        diffLabel = (new Date(localDay) < new Date(ref)) ? (lang==='ko'?' -1일':' -1d') : (lang==='ko'?' +1일':' +1d');
      }
      return timeStr+diffLabel;
    }catch(e){ return ''; }
  }
  function localDateForColumn(iso){
    try{
      var startD = new Date(iso+'T08:00:00+09:00').toLocaleDateString('en-CA',{timeZone:userTz});
      var endD = new Date(iso+'T21:00:00+09:00').toLocaleDateString('en-CA',{timeZone:userTz});
      if(startD===endD){
        var d0=parseISO(startD); return (d0.getMonth()+1)+'/'+d0.getDate();
      }
      var d1=parseISO(startD), d2=parseISO(endD);
      if(d1.getMonth()===d2.getMonth()){ return (d1.getMonth()+1)+'/'+d1.getDate()+'\u2013'+d2.getDate(); }
      return (d1.getMonth()+1)+'/'+d1.getDate()+'\u2013'+(d2.getMonth()+1)+'/'+d2.getDate();
    }catch(e){ return ''; }
  }
  function hourLabels(hour, refDateISO){
    var kst = pad(hour)+':00';
    if(!showLocal){ return {primary:kst, secondary:''}; }
    var loc = localLabelForHour(hour, refDateISO);
    if(localViewOn){ return {primary:loc, secondary:'KST '+kst}; }
    return {primary:kst, secondary:loc};
  }

  function sessionsCol(){ return db.collection('sessions'); }
  function sessionDoc(id){ return db.collection('sessions').doc(id); }

  async function fetchSessionsIndex(){
    var snap = await sessionsCol().get();
    return snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
  }
  async function createSessionDoc(titleKo, titleEn){
    var ref = await sessionsCol().add({titleKo:titleKo, titleEn:titleEn, createdAt:new Date().toISOString()});
    return ref.id;
  }
  async function renameSessionDoc(id, titleKo, titleEn){
    await sessionDoc(id).update({titleKo:titleKo, titleEn:titleEn});
  }
  async function deleteSessionDoc(id){
    var respSnap = await responsesCol(id).get();
    var batch = db.batch();
    respSnap.docs.forEach(function(d){ batch.delete(d.ref); });
    batch.delete(datesDoc(id));
    batch.delete(sessionDoc(id));
    await batch.commit();
  }
  async function fetchActiveDates(id){
    var doc = await datesDoc(id).get();
    return doc.exists ? (doc.data().activeDates || []) : [];
  }
  async function saveActiveDatesDoc(id, dates){
    await datesDoc(id).set({activeDates:dates});
  }
  async function fetchResponses(id){
    var snap = await responsesCol(id).get();
    return snap.docs.map(function(d){ return d.data(); });
  }
  function responseKey(name, affiliation){
    return encodeURIComponent((name||'').trim()+'||'+(affiliation||'').trim());
  }
  async function queryByName(id, name){
    var snap = await responsesCol(id).where('name','==',name).get();
    return snap.docs;
  }
  async function submitResponseDoc(id, name, affiliation, slots){
    var docs = await queryByName(id, name);
    var target = null;
    if(docs.length === 1){
      target = docs[0];
    } else if(docs.length > 1){
      var normAff = (affiliation||'').trim();
      var exact = docs.filter(function(d){ return ((d.data().affiliation)||'').trim() === normAff; });
      if(exact.length >= 1){ target = exact[0]; }
    }
    if(target){ return {ref: target.ref, exists:true}; }
    return {ref: responsesCol(id).doc(responseKey(name, affiliation)), exists:false};
  }
  async function deleteAllResponsesDocs(id){
    var snap = await responsesCol(id).get();
    var batch = db.batch();
    snap.docs.forEach(function(d){ batch.delete(d.ref); });
    await batch.commit();
  }

  function csvEscape(v){
    var s = (v===null||v===undefined) ? '' : String(v);
    if(/[",\n\r]/.test(s)){ s = '"'+s.replace(/"/g,'""')+'"'; }
    return s;
  }
  function slotsToReadable(slots){
    return (slots||[]).slice().sort().map(function(k){
      var parts = k.split('_');
      return parts[0]+' '+parts[1]+':00-'+pad((+parts[1])+1)+':00';
    }).join('; ');
  }
  function downloadCSV(filename, rows){
    var csv = rows.map(function(r){ return r.map(csvEscape).join(','); }).join('\r\n');
    var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  function attachDragHandlers(holder){

    });
  }
  document.addEventListener('mouseup', function(){ isSelecting = false; });
  document.addEventListener('touchend', function(){ isSelecting = false; });
  function updateSelCount(){
    document.getElementById('selCount').textContent = selection.size + t('selCountSuffix');
  }
  document.getElementById('clearSelBtn').addEventListener('click', function(){
    selection.clear();
    renderScheduleGrid();
  });

  var nameModal = document.getElementById('nameModal');
  var loadModal = document.getElementById('loadModal');
  document.getElementById('submitBtn').addEventListener('click', function(){
    if(selection.size===0){ showToast(t('toastSelectFirst')); return; }
    document.getElementById('modalDesc').textContent = t('modalDesc',{n:selection.size});
    document.getElementById('nameInput').value = pendingEditName;
    document.getElementById('affiliationInput').value = pendingEditAffiliation;
    nameModal.classList.add('show');
    setTimeout(function(){ document.getElementById('nameInput').focus(); }, 50);
  });
  document.getElementById('loadMyResponseBtn').addEventListener('click', function(){
    document.getElementById('loadNameInput').value = '';
    document.getElementById('loadAffiliationInput').value = '';
    loadModal.classList.add('show');
    setTimeout(function(){ document.getElementById('loadNameInput').focus(); }, 50);
  });
  document.getElementById('loadModalCancelBtn').addEventListener('click', function(){ loadModal.classList.remove('show'); });
  document.getElementById('loadModalConfirmBtn').addEventListener('click', async function(){
    var name = document.getElementById('loadNameInput').value.trim();
    var affiliation = document.getElementById('loadAffiliationInput').value.trim();
    if(!name){ showToast(t('toastNeedName')); return; }
    var btn = this; btn.disabled = true;
    try{
      var docs = await queryByName(sessionId, name);
      var data = null;
      if(docs.length === 1){
        data = docs[0].data();
      } else if(docs.length > 1){
        if(!affiliation){
          showToast(t('toastMultipleMatches'));
          btn.disabled = false;
          return;
        }
        var exact = docs.filter(function(d){ return ((d.data().affiliation)||'').trim() === affiliation; });
        exact.sort(function(a,b){ return (b.data().submittedAt||'').localeCompare(a.data().submittedAt||''); });
        if(exact.length){ data = exact[0].data(); }
      }
      if(!data){
        showToast(t('toastNoPreviousResponse'));
      } else {
        selection = new Set(data.slots||[]);
        pendingEditName = data.name || name;
        pendingEditAffiliation = data.affiliation || affiliation;
        renderScheduleGrid();
        loadModal.classList.remove('show');
        showToast(t('toastLoadedPrevious',{name:pendingEditName}));
      }
    }catch(e){
      showToast(t('toastLoadFail'));
    }
    btn.disabled = false;
  });
  document.getElementById('modalCancelBtn').addEventListener('click', function(){ nameModal.classList.remove('show'); });
  document.getElementById('nameInput').addEventListener('keydown', function(e){
    if(e.key==='Enter'){ document.getElementById('modalConfirmBtn').click(); }
  });
  document.getElementById('modalConfirmBtn').addEventListener('click', async function(){
    var name = document.getElementById('nameInput').value.trim();
    var affiliation = document.getElementById('affiliationInput').value.trim();
    if(!name){ showToast(t('toastNeedName')); return; }
    var btn = this;
    btn.disabled = true;
    try{
      var res = await submitResponseDoc(sessionId, name, affiliation, Array.from(selection));
      if(res.exists){
        var proceed = confirm(t('toastOverwriteConfirm',{name:name}));
        if(!proceed){ btn.disabled=false; return; }
      }
      await res.ref.set({name:name, affiliation:affiliation, slots:Array.from(selection), submittedAt:new Date().toISOString()});
      nameModal.classList.remove('show');
      showToast(t('toastSubmitSuccess',{name:name}));
      selection.clear();
      pendingEditName = ''; pendingEditAffiliation = '';
      renderScheduleGrid();
    }catch(e){
      showToast(t('toastSubmitFail'));
    }
    btn.disabled = false;
  });

async function refreshHeatmap(){
    renderTzBanner(document.getElementById('tzBannerHeatmap'));
    var holder = document.getElementById('heatmapGridHolder');
    holder.innerHTML = '';
    document.getElementById('heatmapSummary').textContent = '';
    document.getElementById('topSlots').innerHTML = '';
    document.getElementById('respondentList').innerHTML = '';

    if(activeDates.length===0){
      holder.innerHTML = '<div class="empty-state"><div class="big">🗓️</div>'+t('emptyNoDates')+'</div>';
      return;
    }

    var responses;
    try{ responses = await fetchResponses(sessionId); }
    catch(e){ holder.innerHTML = '<div class="empty-state">'+t('toastLoadFail')+'</div>'; return; }

    if(responses.length===0){
      holder.innerHTML = '<div class="empty-state"><div class="big">🌱</div>'+t('emptyNoResponses')+'</div>';
      document.getElementById('heatmapSummary').textContent = t('respondentsPrefix')+': 0';
      return;
    }

    var counts = {}; var namesBySlot = {};
    responses.forEach(function(r){
      var label = r.affiliation ? (r.name+' ('+r.affiliation+')') : r.name;
      (r.slots||[]).forEach(function(k){
        counts[k] = (counts[k]||0)+1;
        if(!namesBySlot[k]) namesBySlot[k]=[];
        namesBySlot[k].push(label);
      });
    });
    var maxCount = 0;
    Object.keys(counts).forEach(function(k){ if(counts[k]>maxCount) maxCount=counts[k]; });
    document.getElementById('heatmapSummary').textContent = t('respondentsPrefix')+': '+responses.length;

    var hourColW = showLocal ? 'minmax(84px,120px)' : 'minmax(60px,84px)';
    var dateColW = showLocal ? 'minmax(78px,1fr)' : 'minmax(50px,1fr)';
    var cols = hourColW + ' ' + activeDates.map(function(){return dateColW;}).join(' ');
    var html = '<div class="grid-scroll"><div class="grid" style="grid-template-columns:'+cols+';">';
    html += '<div class="g-corner"></div>';
    activeDates.forEach(function(iso){
      var d = parseISO(iso);
      html += '<div class="g-datehead">'+(d.getMonth()+1)+'/'+d.getDate()+'<div class="wd">'+WD[d.getDay()]+'</div>'+(showLocal?'<div class="wd-local">'+localDateForColumn(iso)+'</div>':'')+'</div>';
    });
    HOURS.forEach(function(hh){
      var hl = hourLabels(hh, activeDates[0]);
      html += '<div class="g-hour">'+hl.primary+(hl.secondary?'<div class="local">'+hl.secondary+'</div>':'')+'</div>';
      activeDates.forEach(function(iso){
        var k = keyOf(iso,hh);
        var c = counts[k]||0;
        var bg = heatColor(c, maxCount);
        var names = (namesBySlot[k]||[]).join(', ');
        var title = c>0 ? t('peopleAvailable',{n:c})+': '+names : t('noAvailable');
        html += '<div class="g-cell heat" style="background:'+bg+';" title="'+escapeHtml(title)+'" data-key="'+k+'"></div>';
      });
    });
    html += '</div></div>';
    holder.innerHTML = html;

    var infoBox = document.getElementById('heatmapInfoBox');
    infoBox.style.display = 'none';
    holder.querySelectorAll('.g-cell.heat').forEach(function(cell){
      cell.addEventListener('click', function(){
        var k = cell.dataset.key;
        var parts = k.split('_');
        var d = parseISO(parts[0]);
        var label = (d.getMonth()+1)+'/'+d.getDate()+' ('+WD[d.getDay()]+') '+parts[1]+':00\u2013'+pad((+parts[1])+1)+':00';
        var c = counts[k]||0;
        var names = (namesBySlot[k]||[]).join(', ');
        var body = c>0 ? ('<b>'+label+'</b> \u2014 '+t('peopleAvailable',{n:c})+': '+escapeHtml(names)) : ('<b>'+label+'</b> \u2014 '+t('noAvailable'));
        infoBox.innerHTML = '<span>'+body+'</span><button class="close-x" id="heatmapInfoCloseBtn">\u2715</button>';
        infoBox.style.display = 'flex';
        document.getElementById('heatmapInfoCloseBtn').addEventListener('click', function(ev){
          ev.stopPropagation();
          infoBox.style.display = 'none';
        });
      });
    });

    var sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; }).slice(0,3);
    var topHtml = '';
    if(sorted.length===0 || counts[sorted[0]]===0){
      topHtml = '<p style="color:var(--muted);font-size:13px;">'+t('notEnoughData')+'</p>';
    } else {
      sorted.forEach(function(k, idx){
        var parts = k.split('_');
        var d = parseISO(parts[0]);
        var label = (d.getMonth()+1)+'/'+d.getDate()+' ('+WD[d.getDay()]+') '+parts[1]+':00-'+pad((+parts[1])+1)+':00';
        topHtml += '<div class="top-slot-row"><span class="rank">'+(idx+1)+'</span>'+label+'<span class="count">'+t('peopleAvailable',{n:counts[k]})+'</span></div>';
      });
    }
    document.getElementById('topSlots').innerHTML = topHtml;
    document.getElementById('respondentList').innerHTML = responses.map(function(r){
      var label = r.affiliation ? (r.name+' ('+r.affiliation+')') : r.name;
      return '<span class="name-chip">'+escapeHtml(label)+' &middot; '+(r.slots?r.slots.length:0)+'</span>';
    }).join('');
  }

  function renderHeroForSession(){
    var main, sub;
    if(currentSessionMeta){
      main = lang==='ko' ? (currentSessionMeta.titleKo||currentSessionMeta.titleEn) : (currentSessionMeta.titleEn||currentSessionMeta.titleKo);
      var other = lang==='ko' ? currentSessionMeta.titleEn : currentSessionMeta.titleKo;
      sub = (other && other!==main) ? other : '';
    } else {
      main = t('sessionNotFound'); sub='';
    }
    document.getElementById('heroTitle').textContent = main;
    document.getElementById('heroTitleSub').textContent = sub;
  }

  // ================= INIT =================
  (async function init(){
    renderStaticText();

    if(!sessionId){
      document.getElementById('hubView').style.display = '';
      document.getElementById('sessionView').style.display = 'none';
      document.getElementById('heroTitle').textContent = t('heroTagHub');
      document.getElementById('heroTitleSub').textContent = '';

      document.getElementById('hubLocked').style.display = 'none';
      document.getElementById('hubAdminContent').style.display = '';
      try{
        sessionsIndex = await fetchSessionsIndex();
      }catch(e){
        showToast(t('toastLoadFail'));
        sessionsIndex = [];
      }
      renderSessionList();
      return;
    }

    document.getElementById('hubView').style.display = 'none';
    document.getElementById('sessionView').style.display = '';

    try{
      var doc = await sessionDoc(sessionId).get();
      currentSessionMeta = doc.exists ? Object.assign({id:doc.id}, doc.data()) : null;
    }catch(e){
      currentSessionMeta = null;
    }
    renderHeroForSession();

    if(!currentSessionMeta){
      document.getElementById('sessionNotFound').style.display = '';
      document.getElementById('sessionTabs').style.display = 'none';
      return;
    }

    document.getElementById('sessionLinkInput').value = fullLink(sessionId);
    document.getElementById('adminLinkInput').value = fullLinkAdmin(sessionId);
    document.getElementById('renameKoInput').value = currentSessionMeta.titleKo || '';
    document.getElementById('renameEnInput').value = currentSessionMeta.titleEn || '';

    if(!isAdmin){
      document.getElementById('tabAdminBtn').style.display = 'none';
    }

    try{
      activeDates = await fetchActiveDates(sessionId);
      activeDates.sort();
      adminSelection = new Set(activeDates);
    }catch(e){
      activeDates = []; adminSelection = new Set();
      showToast(t('toastLoadFail'));
    }
    renderAdminCalendar();
    renderScheduleGrid();
  })();

})();
</script>
